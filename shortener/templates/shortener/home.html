<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            font-family:'Segoe UI',sans-serif;

            background:
            linear-gradient(
            135deg,
            #0f172a,
            #1e1b4b,
            #312e81,
            #4c1d95
            );
        }

        .blob{
            position:absolute;
            border-radius:50%;
            filter:blur(80px);
            opacity:.4;
        }

        .blob1{
            width:300px;
            height:300px;
            background:#6366f1;
            top:-50px;
            left:-50px;
        }

        .blob2{
            width:350px;
            height:350px;
            background:#8b5cf6;
            bottom:-100px;
            right:-100px;
        }

        .hero{
            width:100%;
            max-width:700px;
            text-align:center;
            z-index:10;
            padding:40px;
        }

        .logo{
            color:white;
            font-size:4rem;
            font-weight:800;
            margin-bottom:15px;
        }

        .tagline{
            color:#d1d5db;
            font-size:1.2rem;
            margin-bottom:40px;
        }

        .form-card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:35px;
        }

        input[type="url"]{
            width:100%;
            padding:18px !important;
            border-radius:15px !important;
            border:none !important;
            font-size:1rem;
        }

        input[type="url"]:focus{
            box-shadow:
            0 0 20px rgba(99,102,241,.8) !important;
        }

        .generate-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:15px;
            color:white;
            font-size:1.1rem;
            font-weight:600;
            margin-top:10px;
            background:
            linear-gradient(
            90deg,
            #6366f1,
            #8b5cf6
            );
            transition:.3s;
        }

        .generate-btn:hover{
            transform:translateY(-2px);
        }

        .result-card{
            margin-top:25px;
            padding:20px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
        }

        .result-title{
            color:white;
            text-align:left;
            margin-bottom:12px;
        }

        .short-link{
            color:#60a5fa;
            font-weight:600;
            text-decoration:none;
            word-break:break-all;
        }

        .action-buttons{
            display:flex;
            gap:10px;
            margin-top:12px;
        }

        .copy-btn{
            flex:1;
        }

        .open-btn{
            flex:1;
        }

        .error-msg{
            color:#ff6b6b;
            margin-top:10px;
            text-align:left;
        }

        #toast{
            position:fixed;
            top:20px;
            right:20px;
            background:#10b981;
            color:white;
            padding:12px 18px;
            border-radius:10px;
            display:none;
            z-index:999;
        }

    </style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="hero">

    <h1 class="logo">⚡ QuickLink</h1>

    <p class="tagline">
        Shorten URLs in seconds and share them anywhere.
    </p>

    <div class="form-card">

        <form method="POST">

            {% csrf_token %}

            {{ form.url }}

            {% if form.url.errors %}
                <p class="error-msg">
                    ❌ Invalid URL. Please enter a valid URL.
                </p>
            {% endif %}

            <button
                id="generateBtn"
                class="generate-btn"
                type="submit">

                Shorten URL

            </button>

        </form>

        {% if short_url %}

        <div class="result-card">

            <h5 class="result-title">
                ✨ Your link is ready
            </h5>

            <a
                href="{{ short_url }}"
                target="_blank"
                class="short-link"
                id="shortUrl">

                {{ short_url }}

            </a>

            <div class="action-buttons">

                <button
                    onclick="copyUrl()"
                    class="btn btn-success copy-btn">

                    Copy

                </button>

                <a
                    href="{{ short_url }}"
                    target="_blank"
                    class="btn btn-primary open-btn">

                    Open

                </a>

            </div>

        </div>

        {% endif %}

    </div>

</div>

<div id="toast">
    Link copied successfully!
</div>

<script>

function copyUrl(){

    const url =
    document.getElementById("shortUrl").innerText;

    navigator.clipboard.writeText(url);

    const toast =
    document.getElementById("toast");

    toast.style.display="block";

    setTimeout(()=>{

        toast.style.display="none";

    },2000);
}

document.querySelector("form")
.addEventListener("submit",function(){

    document.getElementById(
    "generateBtn").innerHTML="Generating...";

});

</script>

</body>
</html>
